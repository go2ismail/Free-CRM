services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: crm-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - crm-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build: .
    container_name: crm-api
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - crm-network
    volumes:
      - app_data:/app/wwwroot/app_data

volumes:
  mssql_data:
  app_data:

networks:
  crm-network:
    driver: bridge